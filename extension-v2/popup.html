<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Calendar Bridge v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      background: #111118;
      color: #e2e8f0;
      user-select: none;
    }

    /* ── Header ── */
    .hd {
      padding: 14px 16px 12px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .hd-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .hd-title { font-size: 13px; font-weight: 700; color: #f1f5f9; line-height: 1.2; }
    .hd-sub   { font-size: 10px; color: rgba(226,232,240,0.35); margin-top: 1px; }
    .hd-ver {
      margin-left: auto; flex-shrink: 0;
      font-size: 10px; font-weight: 600; padding: 2px 7px;
      background: rgba(139,92,246,0.2); color: #a78bfa;
      border: 1px solid rgba(139,92,246,0.3); border-radius: 99px;
    }

    /* ── Sections ── */
    .section {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .sec-label {
      font-size: 9px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: rgba(226,232,240,0.28);
      margin-bottom: 8px;
    }

    /* ── Status rows ── */
    .row {
      display: flex; align-items: center; gap: 7px;
      padding: 3px 0;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-off     { background: rgba(255,255,255,0.15); }
    .dot-on      { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.6); }
    .dot-app     { background: #3b82f6; box-shadow: 0 0 6px rgba(59,130,246,0.6); }
    .dot-idle    { background: rgba(255,255,255,0.15); }
    .dot-working { background: #f97316; box-shadow: 0 0 6px rgba(249,115,22,0.7); animation: pulse .8s ease-in-out infinite; }
    .dot-ok      { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.6); }
    .dot-error   { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.6); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }

    .row-name { font-size: 11px; color: rgba(226,232,240,0.45); flex-shrink: 0; min-width: 80px; }
    .row-val  { font-size: 11px; font-weight: 600; color: #f1f5f9; flex: 1; }
    .row-ts   { font-size: 10px; color: rgba(226,232,240,0.3); white-space: nowrap; }
    .btn-info {
      width: 16px; height: 16px; border-radius: 50%; border: none;
      background: rgba(255,255,255,0.08); color: rgba(226,232,240,0.4);
      font-size: 9px; font-weight: 700; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .btn-info:hover { background: rgba(255,255,255,0.15); color: #e2e8f0; }
    .btn-info.active { background: rgba(139,92,246,0.3); color: #a78bfa; }
    .op-detail {
      display: none; margin: 4px 0 2px 15px;
      padding: 6px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      font-size: 10px; line-height: 1.5;
    }
    .op-detail.visible { display: block; }
    .op-detail-row { display: flex; gap: 6px; }
    .op-detail-key { color: rgba(226,232,240,0.35); min-width: 60px; flex-shrink: 0; }
    .op-detail-val { color: #e2e8f0; word-break: break-all; }

    /* ── Actions ── */
    .actions {
      padding: 10px 14px;
      display: flex; gap: 6px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .btn {
      flex: 1; padding: 7px 10px; border-radius: 8px; border: none;
      font-size: 11px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 5px;
      transition: opacity .15s, transform .1s;
    }
    .btn:hover:not(:disabled) { opacity: .85; transform: scale(1.02); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; }
    .btn-ghost {
      background: rgba(255,255,255,0.05); color: #94a3b8;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ── Events section ── */
    .evts-hd {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 7px;
    }
    .btn-json {
      padding: 2px 7px; border-radius: 5px;
      border: 1px solid rgba(139,92,246,0.3);
      background: rgba(139,92,246,0.1); color: #a78bfa;
      font-size: 10px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-json:hover  { background: rgba(139,92,246,0.2); }
    .btn-json.active { background: rgba(139,92,246,0.3); }

    .evt-list {
      max-height: 140px; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: rgba(139,92,246,0.3) transparent;
    }
    .evt-row {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 10px;
    }
    .evt-row:last-child { border-bottom: none; }
    .evt-arrow { font-size: 7px; color: #a78bfa; flex-shrink: 0; }
    .evt-subj  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #e2e8f0; font-size: 11px; }
    .evt-teams { font-size: 9px; background: rgba(59,130,246,0.2); color: #93c5fd; border-radius: 3px; padding: 1px 4px; flex-shrink: 0; }
    .evt-time  { font-size: 9px; color: rgba(226,232,240,0.35); flex-shrink: 0; white-space: nowrap; }

    .empty-hint {
      font-size: 10px; color: rgba(226,232,240,0.3);
      padding: 8px 0; text-align: center;
    }

    .json-area {
      display: none; width: 100%; margin-top: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; color: rgba(226,232,240,0.55);
      font-family: 'SF Mono', 'Menlo', monospace; font-size: 9px;
      padding: 6px 8px; resize: none; outline: none;
      max-height: 120px; overflow-y: auto;
    }
    .json-area.visible { display: block; }

    /* ── Settings ── */
    .settings {
      padding: 10px 14px 12px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .field-label {
      font-size: 9px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: rgba(226,232,240,0.28);
      margin-bottom: 5px;
    }
    .field-row { display: flex; align-items: center; gap: 5px; }
    .input {
      padding: 5px 8px; border-radius: 6px; font-size: 11px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(139,92,246,0.2);
      color: #e2e8f0; outline: none; transition: border-color .15s; width: 100%;
    }
    .input:focus { border-color: rgba(139,92,246,0.5); }
    .input-sm { width: 48px; flex: none; text-align: center; }
    .unit { font-size: 10px; color: rgba(226,232,240,0.3); white-space: nowrap; }
    .saved { font-size: 10px; color: #10b981; opacity: 0; transition: opacity .3s; white-space: nowrap; }
    .saved.show { opacity: 1; }
    .url-field { grid-column: 1 / -1; }
    .input-hint { font-size: 9px; color: rgba(226,232,240,0.22); margin-top: 3px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="hd">
    <div class="hd-icon">🗓</div>
    <div>
      <div class="hd-title">Calendar Bridge</div>
      <div class="hd-sub">Audio AI Assistant</div>
    </div>
    <div class="hd-ver">v2.4</div>
  </div>

  <!-- CONNESSIONE -->
  <div class="section">
    <div class="sec-label">Connessione</div>
    <div class="row">
      <span id="dotOutlook" class="dot dot-off"></span>
      <span class="row-name">Outlook Live</span>
      <span id="statusOutlook" class="row-val">—</span>
      <span id="seenAgo" class="row-ts">—</span>
    </div>
    <div class="row">
      <span id="dotApp" class="dot dot-off"></span>
      <span class="row-name">App AI</span>
      <span id="statusApp" class="row-val">—</span>
      <span id="appSeenAgo" class="row-ts">—</span>
    </div>
  </div>

  <!-- OPERAZIONI -->
  <div class="section">
    <div class="sec-label">Operazioni</div>
    <div class="row">
      <span id="dotGet" class="dot dot-idle"></span>
      <span class="row-name">GET Outlook</span>
      <span id="getLabel" class="row-val">—</span>
      <span id="getTsEl" class="row-ts">—</span>
      <button class="btn-info" id="getInfoBtn" title="Dettagli operazione GET">i</button>
    </div>
    <div class="op-detail" id="getDetail"></div>
    <div class="row">
      <span id="dotPost" class="dot dot-idle"></span>
      <span class="row-name">POST App</span>
      <span id="postLabel" class="row-val">—</span>
      <span id="postTsEl" class="row-ts">—</span>
      <button class="btn-info" id="postInfoBtn" title="Dettagli operazione POST">i</button>
    </div>
    <div class="op-detail" id="postDetail"></div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="syncBtn"
      title="Ri-chiede gli eventi a Outlook senza ricaricare la pagina">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M21 2v6h-6M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6M21 12a9 9 0 01-15 6.7L3 16"/>
      </svg>
      Forza Sync
    </button>
    <button class="btn btn-ghost" id="reloadBtn"
      title="Ricarica il tab Outlook — usa solo se non si connette">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Ricarica Outlook
    </button>
  </div>

  <!-- Events -->
  <div class="section">
    <div class="evts-hd">
      <span id="evtCountLabel" class="sec-label">eventi</span>
      <button class="btn-json" id="jsonBtn">{ }</button>
    </div>
    <div id="evtList" class="evt-list"></div>
    <textarea id="jsonArea" class="json-area" readonly></textarea>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div>
      <div class="field-label">Auto-sync <span class="saved" id="intervalSaved">✓</span></div>
      <div class="field-row">
        <input class="input input-sm" id="intervalInput" type="number" min="1" max="60" value="1" />
        <span class="unit">min</span>
      </div>
    </div>
    <div></div>
    <div class="url-field">
      <div class="field-label">App URL <span class="saved" id="urlSaved">✓</span></div>
      <input class="input" id="appUrl" type="url" placeholder="http://127.0.0.1:3000/" />
      <div class="input-hint">Salvataggio automatico</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
