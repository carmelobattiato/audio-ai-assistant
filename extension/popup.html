<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f0f1a;
      color: #e2e8f0;
    }

    /* Header */
    .header {
      padding: 14px 16px 10px;
      background: linear-gradient(135deg, rgba(124,58,237,0.5), rgba(192,38,211,0.35));
      border-bottom: 1px solid rgba(139,92,246,0.35);
      display: flex; align-items: center; gap: 10px;
    }
    .header-icon { font-size: 22px; }
    .header-title { font-weight: 700; font-size: 14px; color: #c4b5fd; }
    .header-sub   { font-size: 10px; color: rgba(196,181,253,0.55); margin-top: 1px; }

    /* Sections */
    .section { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(226,232,240,0.35); margin-bottom: 8px; }

    /* Status rows */
    .srow { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
    .srow-label { font-size: 12px; color: rgba(226,232,240,0.65); display: flex; align-items: center; gap: 6px; }
    .srow-value { font-size: 12px; font-weight: 600; }

    /* Status badges */
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 9999px; font-size: 11px; font-weight: 600; }
    .badge-green  { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .badge-orange { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .badge-gray   { background: rgba(255,255,255,0.05); color: #64748b; border: 1px solid rgba(255,255,255,0.08); }
    .badge-blue   { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
    .dot-on  { width: 7px; height: 7px; border-radius: 50%; background: #10b981; display: inline-block; }
    .dot-off { width: 7px; height: 7px; border-radius: 50%; background: #475569; display: inline-block; }
    .dot-ok  { width: 7px; height: 7px; border-radius: 50%; background: #3b82f6; display: inline-block; }

    .count-val { color: #c4b5fd; font-weight: 700; font-size: 13px; }

    /* Buttons */
    .btn { width: 100%; padding: 9px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: opacity .15s, transform .1s; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .btn:hover:not(:disabled) { opacity: .85; transform: scale(1.01); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: linear-gradient(135deg, #7c3aed, #c026d3); color: white; box-shadow: 0 0 16px rgba(124,58,237,0.4); }
    .btn-secondary { background: rgba(255,255,255,0.07); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }

    /* Auto label */
    .auto-label { text-align: center; font-size: 10px; color: rgba(226,232,240,0.35); margin-top: 6px; }

    /* URL input */
    .url-wrap { position: relative; }
    .url-input {
      width: 100%; padding: 7px 36px 7px 10px; border-radius: 6px; font-size: 11px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(139,92,246,0.25);
      color: #e2e8f0; outline: none; transition: border-color .15s;
    }
    .url-input:focus { border-color: rgba(139,92,246,0.6); }
    .url-saved-icon { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0; transition: opacity .3s; }
    .url-saved-icon.show { opacity: 1; }
    .url-hint { font-size: 10px; color: rgba(226,232,240,0.35); margin-top: 4px; }

    /* Divider */
    hr { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 0; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🗓</div>
    <div>
      <div class="header-title">Calendar Bridge</div>
      <div class="header-sub">Audio AI Assistant</div>
    </div>
  </div>

  <!-- Outlook status -->
  <div class="section">
    <div class="section-title">Outlook Live</div>
    <div class="srow">
      <span class="srow-label"><span id="dotOutlook" class="dot-off"></span>Connessione</span>
      <span id="badgeOutlook" class="badge badge-gray">Non rilevato</span>
    </div>
    <div class="srow">
      <span class="srow-label">Riunioni rilevate</span>
      <span id="outlookCount" class="count-val">—</span>
    </div>
    <div class="srow">
      <span class="srow-label">Prossimo auto-sync</span>
      <span id="outlookSeenAt" class="srow-value" style="color:#94a3b8; font-variant-numeric: tabular-nums">—</span>
    </div>
  </div>

  <!-- App status -->
  <div class="section">
    <div class="section-title">App AI Assistant</div>
    <div class="srow">
      <span class="srow-label"><span id="dotApp" class="dot-off"></span>Rilevata</span>
      <span id="badgeApp" class="badge badge-gray">Non trovata</span>
    </div>
    <div class="srow">
      <span class="srow-label">Riunioni sincronizzate</span>
      <span id="syncedCount" class="count-val">—</span>
    </div>
    <div class="srow">
      <span class="srow-label">Prossimo auto-sync</span>
      <span id="syncedAt" class="srow-value" style="color:#94a3b8; font-variant-numeric: tabular-nums">—</span>
    </div>
  </div>

  <!-- Actions -->
  <div class="section">
    <div class="btn-row">
      <button class="btn btn-primary" id="syncBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 2v6h-6M3 12a9 9 0 0115-6.7L21 8M3 22v-6h6M21 12a9 9 0 01-15 6.7L3 16"/></svg>
        Sincronizza ora
      </button>
      <button class="btn btn-secondary" id="reloadOutlookBtn" title="Ricarica il tab Outlook per forzare un nuovo fetch">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        Ricarica
      </button>
    </div>
    <div class="auto-label" id="autoLabel">Auto-sync: ogni 15 min</div>
  </div>

  <!-- App URL -->
  <div class="section" style="border-bottom: none;">
    <div class="section-title">App URL</div>
    <div class="url-wrap">
      <input class="url-input" id="appUrl" type="url" placeholder="http://127.0.0.1:8090/" />
      <span class="url-saved-icon" id="savedIcon">✓</span>
    </div>
    <div class="url-hint">Salvataggio automatico · cambia se usi una porta diversa</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
